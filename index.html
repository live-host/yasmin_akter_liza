<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="Explore the architectural projects and spatial dynamics by Yasmin Akter Liza. A professional portfolio showcasing exterior, interior, and sustainable design.">
    <meta name="keywords" content="Architecture, Portfolio, Yasmin Akter Liza, Architect, Interior Design, Exterior Design, Sustainable Design">
    <meta name="author" content="Yasmin Akter Liza">

    <meta property="og:type" content="website">
    <meta property="og:title" content="Yasmin Akter LIZA - Architecture Portfolio">
    <meta property="og:description" content="Professional architecture portfolio showcasing innovative spatial dynamics and sustainable designs.">
    <meta property="og:image" content="assets/profile.png"> <meta property="og:url" content="https://yourwebsite.com">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&family=Playfair+Display:ital,wght@0,700;0,900;1,700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    colors: {
                        bronze: '#CD7F32'
                    }
                }
            }
        }
    </script>

    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { margin: 0; overflow-x: hidden; }
        ::selection { background-color: #CD7F32; color: #FFFFFF; }
        
        .blueprint-grid {
            background-size: 40px 40px;
            background-image: linear-gradient(to right, rgba(205, 127, 50, 0.05) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(205, 127, 50, 0.05) 1px, transparent 1px);
        }
        
        .noise {
            background-image: url('data:image/svg+xml,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
        }

        .reveal-up { opacity: 0; transform: translateY(40px); transition: all 1.2s cubic-bezier(0.16, 1, 0.3, 1); }
        .reveal-left { opacity: 0; transform: translateX(40px); transition: all 1.2s cubic-bezier(0.16, 1, 0.3, 1); }
        .reveal-right { opacity: 0; transform: translateX(-40px); transition: all 1.2s cubic-bezier(0.16, 1, 0.3, 1); }
        
        .revealed { opacity: 1; transform: translate(0, 0); }
    </style>
</head>
<body class="min-h-screen transition-colors duration-1000 bg-[#F8F9FA] text-[#111827] dark:bg-[#050507] dark:text-[#F9FAFB] font-sans selection:bg-bronze selection:text-[#FFFFFF]">

    <div class="blueprint-grid fixed inset-0 z-0 pointer-events-none opacity-30" aria-hidden="true"></div>
    <div class="noise fixed inset-0 z-[1] pointer-events-none mix-blend-overlay opacity-[0.03] dark:opacity-[0.05]" aria-hidden="true"></div>
    
    <div id="cursor-dot" class="fixed w-2 h-2 bg-bronze rounded-full z-[1000] pointer-events-none transition-transform duration-75 ease-out hidden lg:block shadow-[0_0_12px_#CD7F32]" aria-hidden="true"></div>
    <div id="cursor-h" class="fixed left-0 w-full h-[1px] bg-bronze/10 z-[999] pointer-events-none hidden lg:block" aria-hidden="true"></div>
    <div id="cursor-v" class="fixed top-0 w-[1px] h-full bg-bronze/10 z-[999] pointer-events-none hidden lg:block" aria-hidden="true"></div>

    <div id="scroll-progress" class="fixed top-0 left-0 h-[2px] bg-bronze z-[110] transition-all duration-100 w-0 shadow-[0_0_8px_#CD7F32]" aria-hidden="true"></div>

    <header>
        <nav class="fixed top-0 w-full z-[100] px-6 py-6 md:px-12 flex justify-between items-center mix-blend-difference">
            <div class="flex items-center gap-4 cursor-pointer group">
                <div class="w-10 h-10 border-2 border-bronze flex items-center justify-center rotate-45 group-hover:bg-bronze transition-colors duration-500 shrink-0">
                    <span data-cms-text="logo_text" class="text-xs -rotate-45 font-black text-bronze group-hover:text-[#08080A]">YA</span>
                </div>
                <span data-cms-text="nav_title" class="text-xs md:text-sm tracking-[0.3em] uppercase font-black text-[#FFFFFF] hidden sm:block drop-shadow-md truncate">Architecture Studio</span>
            </div>
            <div class="flex items-center gap-8">
                <button id="theme-toggle" aria-label="Toggle Dark Mode" class="p-3 border border-[#FFFFFF]/20 rounded-full hover:border-bronze transition-all bg-[#FFFFFF]/10 backdrop-blur-md text-white shadow-lg hover:shadow-[0_0_20px_rgba(205,127,50,0.5)] shrink-0">
                    <i data-lucide="sun" id="theme-icon" class="w-5 h-5"></i>
                </button>
            </div>
        </nav>
    </header>

    <main>
        <section class="relative min-h-[90vh] flex flex-col items-center justify-center px-6 pt-24 pb-20 overflow-hidden">
            <div class="text-center z-10 w-full max-w-6xl mx-auto flex flex-col items-center">
                <div class="mb-12 flex items-center justify-center gap-4">
                    <span class="h-[2px] w-12 bg-bronze"></span>
                    <p data-cms-text="hero_tagline" class="text-xs md:text-sm tracking-[0.6em] md:tracking-[0.8em] uppercase text-bronze font-black italic drop-shadow-sm break-words">স্থাপনাই জীবন</p>
                    <span class="h-[2px] w-12 bg-bronze"></span>
                </div>
                
                <div class="flex flex-col md:flex-row items-center justify-center gap-12 lg:gap-20 w-full">
                    <div class="relative group cursor-default flex-shrink-0">
                        <div class="absolute inset-[-12%] rounded-full border-2 border-bronze/30 border-t-bronze animate-[spin_20s_linear_infinite]"></div>
                        <div class="relative w-[55vw] h-[55vw] sm:w-[40vw] sm:h-[40vw] md:w-[24vw] md:h-[24vw] lg:w-[20vw] lg:h-[20vw] rounded-full overflow-hidden border-2 border-[#FFFFFF]/20 shadow-[0_0_60px_rgba(0,0,0,0.4)] z-10 bg-[#121214] dark:bg-[#EAEAEA]">
                            <img data-cms-src="hero_image" src="assets/profile.png" fetchpriority="high" decoding="async" class="w-full h-full object-cover grayscale opacity-90 group-hover:grayscale-0 group-hover:opacity-100 transition-all duration-1000 ease-in-out" alt="Portrait" />
                            <div class="absolute inset-0 transition-colors duration-700 bg-[#000000]/10 dark:bg-[#FFFFFF]/5 group-hover:bg-transparent"></div>
                        </div>
                        <div class="absolute bottom-4 right-4 md:bottom-2 md:right-2 lg:bottom-4 lg:right-4 w-14 h-14 bg-bronze rounded-full border-[4px] border-[#08080A] dark:border-[#F9F9F8] z-20 flex items-center justify-center text-[#FFFFFF] shadow-2xl transition-transform group-hover:scale-110">
                            <i data-lucide="pencil-ruler" class="w-6 h-6"></i>
                        </div>
                    </div>

                    <div class="flex flex-col items-center md:items-start text-center md:text-left mt-6 md:mt-0 max-w-full">
                        <h1 data-cms-text="hero_name" class="text-[12vw] sm:text-[10vw] md:text-[7vw] lg:text-[6vw] font-serif leading-none italic tracking-tight mb-4 text-[#111827] dark:text-[#FFFFFF] font-bold break-words">Yasmin Akter</h1>
                        
                        <div class="flex flex-wrap items-center justify-center md:justify-start gap-4 mb-5">
                            <div class="h-[2px] w-8 md:w-12 bg-bronze hidden sm:block"></div>
                            <span data-cms-text="hero_subtitle" class="text-xs md:text-sm font-black tracking-[0.2em] md:tracking-[0.4em] uppercase text-[#374151] dark:text-[#D1D5DB] break-words text-center md:text-left">Architectural Excellence // Spatial Dynamics</span>
                        </div>
                        
                        <h1 data-cms-text="hero_highlight" class="text-[15vw] sm:text-[12vw] md:text-[9vw] lg:text-[8.5vw] font-black leading-[0.8] tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-[#4B5563] via-[#CD7F32] to-[#111827] dark:from-[#F3F4F6] dark:via-[#CD7F32] dark:to-[#9CA3AF] -ml-1 md:-ml-2 drop-shadow-lg break-words">LIZA.</h1>
                    </div>
                </div>
            </div>
        </section>

        </main>

    <script>
        // Google Sheet URL from your Context
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR7FP16pzKLNjJjYl_mlLWZJqGzF-tBgi7JeeWeHGelRd08CfxXvcOeo28BzFKGG2IBN-AhI3lmBWwQ/pub?gid=0&single=true&output=csv"; 

        async function loadCMSData() {
            if (!CSV_URL.includes("google.com")) return;
            try {
                const response = await fetch(CSV_URL);
                const csvText = await response.text();
                const rows = csvText.split('\n').map(row => {
                    const regex = /,(?=(?:(?:[^"]*"){2})*[^"]*$)/;
                    return row.split(regex).map(val => val.replace(/^"|"$/g, '').trim());
                });
                const data = {};
                rows.forEach(r => { if (r.length >= 2 && r[0]) data[r[0]] = r[1]; });

                for (const [key, value] of Object.entries(data)) {
                    if (!value) continue;
                    document.querySelectorAll(`[data-cms-text="${key}"]`).forEach(el => el.innerText = value);
                    document.querySelectorAll(`[data-cms-src="${key}"]`).forEach(el => el.src = value);
                    document.querySelectorAll(`[data-cms-href="${key}"]`).forEach(el => el.href = value);
                    document.querySelectorAll(`[data-cms-icon="${key}"]`).forEach(el => el.setAttribute('data-lucide', value));
                    document.querySelectorAll(`[data-cms-style-width="${key}"]`).forEach(el => el.style.width = `${value}%`);
                }
                lucide.createIcons();
            } catch (error) { console.error("CMS Load Error:", error); }
        }
        loadCMSData();

        // UI Interactions (Cursor, Scroll, Theme)
        lucide.createIcons();
        const themeToggle = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        themeToggle.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            themeIcon.setAttribute('data-lucide', document.documentElement.classList.contains('dark') ? 'sun' : 'moon');
            lucide.createIcons();
        });
        
        // Custom Cursor Logic
        const cursorDot = document.getElementById('cursor-dot');
        const cursorH = document.getElementById('cursor-h');
        const cursorV = document.getElementById('cursor-v');
        if (!('ontouchstart' in window)) {
            window.addEventListener('mousemove', (e) => {
                requestAnimationFrame(() => {
                    const { clientX: x, clientY: y } = e;
                    if(cursorDot) cursorDot.style.transform = `translate(${x}px, ${y}px) translate(-50%, -50%)`;
                    if(cursorH) cursorH.style.transform = `translateY(${y}px)`;
                    if(cursorV) cursorV.style.transform = `translateX(${x}px)`;
                });
            });
        }

        // Intersection Observer
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('revealed');
                }
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal-up, .reveal-left, .reveal-right').forEach(el => observer.observe(el));
    </script>
</body>
</html>
