<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Yasmin Akter Liza - Professional Architecture Portfolio showcasing exterior design, interior planning, and built projects in Bangladesh.">
    <title>Yasmin Akter Liza | Architecture Portfolio</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,400&display=swap');
        
        html { scroll-behavior: smooth; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #080808; margin: 0; overflow-x: hidden; }
        .font-serif { font-family: 'Cormorant Garamond', serif; }
        
        /* Optimized Subtle Grain Texture - Disabled on small screens for performance */
        .grain {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            opacity: 0.04; pointer-events: none; z-index: 100;
        }
        
        /* Custom Architectural Cursors - Hardware Accelerated */
        .custom-cursor {
            position: fixed; top: 0; left: 0; width: 36px; height: 36px;
            border: 1px solid rgba(205, 127, 50, 0.4); border-radius: 50%;
            pointer-events: none; z-index: 200;
            will-change: transform;
        }
        .cursor-inner {
            position: fixed; top: 0; left: 0; width: 4px; height: 4px;
            background: #CD7F32; border-radius: 50%;
            pointer-events: none; z-index: 201;
            will-change: transform;
        }
        .blueprint-line-h { position: fixed; top: 0; left: 0; height: 1px; width: 100vw; background: rgba(255,255,255,0.03); pointer-events: none; z-index: 90; will-change: transform; }
        .blueprint-line-v { position: fixed; top: 0; left: 0; width: 1px; height: 100vh; background: rgba(255,255,255,0.03); pointer-events: none; z-index: 90; will-change: transform; }
        
        .text-outline { -webkit-text-stroke: 1px rgba(255,255,255,0.15); color: transparent; }
        .vertical-rl { writing-mode: vertical-rl; }
        
        /* Golden Shimmer Effect */
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .shimmer {
            background: linear-gradient(90deg, #222, #CD7F32, #222);
            background-size: 200% 100%;
            animation: shimmer 4s infinite linear;
            -webkit-background-clip: text;
            color: transparent;
        }
        
        /* Hide Default Cursor on Desktop and disable heavy effects on mobile */
        @media (min-width: 1024px) {
            body { cursor: none !important; }
            a, button { cursor: none !important; }
        }
        @media (max-width: 768px) {
            .grain { display: none; } /* Saves battery and CPU on mobile */
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Optimized Lucide Icon Adapter ---
        const Icon = ({ name, className = "" }) => {
            const spanRef = useRef(null);
            
            useEffect(() => {
                if (spanRef.current && window.lucide) {
                    spanRef.current.innerHTML = `<i data-lucide="${name}" class="${className}"></i>`;
                    window.lucide.createIcons({ root: spanRef.current });
                }
            }, [name, className]);
            
            return <span ref={spanRef} className="inline-flex items-center justify-center"></span>;
        };

        // --- Scroll Animation Hook ---
        const useIntersectionObserver = (options = {}) => {
            const [isVisible, setIsVisible] = useState(false);
            const domRef = useRef();

            useEffect(() => {
                const observer = new IntersectionObserver(([entry]) => {
                    if (entry.isIntersecting) {
                        setIsVisible(true);
                        observer.unobserve(entry.target); // Stop observing once visible for performance
                    }
                }, { threshold: 0.1, ...options });

                const currentRef = domRef.current;
                if (currentRef) observer.observe(currentRef);

                return () => {
                    if (currentRef) observer.unobserve(currentRef);
                };
            }, [options]);

            return [domRef, isVisible];
        };

        // --- FadeIn Component ---
        const FadeInSection = ({ children, delay = 0, className = '', direction = 'up' }) => {
            const [ref, isVisible] = useIntersectionObserver();
            
            const getTranslate = () => {
                switch(direction) {
                    case 'left': return 'translate-x-8 md:translate-x-12';
                    case 'right': return '-translate-x-8 md:-translate-x-12';
                    default: return 'translate-y-10 md:translate-y-12';
                }
            };

            return (
                <div
                    ref={ref}
                    className={`transition-all duration-1000 ease-out ${
                        isVisible ? 'opacity-100 translate-x-0 translate-y-0' : `opacity-0 ${getTranslate()}`
                    } ${className}`}
                    style={{ transitionDelay: `${delay}ms` }}
                >
                    {children}
                </div>
            );
        };

        function App() {
            // Refs for direct DOM manipulation (Fixes React re-render performance issue)
            const cursorRef = useRef(null);
            const cursorInnerRef = useRef(null);
            const lineHRef = useRef(null);
            const lineVRef = useRef(null);
            const cardRef = useRef(null);
            const dimXRef = useRef(null);
            const dimYRef = useRef(null);

            // Handle Mouse Move without triggering React State Re-renders
            useEffect(() => {
                // Only run custom cursor logic on non-touch devices
                const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
                if (isTouchDevice) return;

                let animationFrameId;

                const handleMove = (e) => {
                    // Use requestAnimationFrame for smooth 60fps performance
                    animationFrameId = requestAnimationFrame(() => {
                        const x = e.clientX;
                        const y = e.clientY;
                        
                        // Update Cursors & Lines directly
                        if (cursorRef.current) cursorRef.current.style.transform = `translate(${x}px, ${y}px) translate(-50%, -50%)`;
                        if (cursorInnerRef.current) cursorInnerRef.current.style.transform = `translate(${x}px, ${y}px) translate(-50%, -50%)`;
                        if (lineHRef.current) lineHRef.current.style.transform = `translateY(${y}px)`;
                        if (lineVRef.current) lineVRef.current.style.transform = `translateX(${x}px)`;

                        // 3D Card Math
                        const centerX = window.innerWidth / 2;
                        const centerY = window.innerHeight / 2;
                        const rotateX = ((y - centerY) / centerY) * -15; // Limit rotation to 15 degrees
                        const rotateY = ((x - centerX) / centerX) * 15;

                        if (cardRef.current) {
                            cardRef.current.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateZ(0)`;
                        }

                        // Update Dimension Labels
                        if (dimXRef.current) dimXRef.current.innerText = `Dim_X: ${Math.abs(rotateY * 2).toFixed(2)}`;
                        if (dimYRef.current) dimYRef.current.innerText = `Dim_Y: ${Math.abs(rotateX * 2).toFixed(2)}`;
                    });
                };

                window.addEventListener('mousemove', handleMove, { passive: true });
                return () => {
                    window.removeEventListener('mousemove', handleMove);
                    cancelAnimationFrame(animationFrameId);
                };
            }, []);

            return (
                <div className="min-h-screen text-[#f0f0f0] relative selection:bg-[#CD7F32] selection:text-white">
                    <div className="grain"></div>
                    
                    {/* Custom Cursor UI (Desktop Only) */}
                    <div className="hidden lg:block">
                        <div ref={cursorRef} className="custom-cursor"></div>
                        <div ref={cursorInnerRef} className="cursor-inner"></div>
                        <div ref={lineHRef} className="blueprint-line-h"></div>
                        <div ref={lineVRef} className="blueprint-line-v"></div>
                    </div>

                    {/* Vertical Side Info */}
                    <div className="fixed left-8 bottom-12 z-[60] vertical-rl hidden xl:block opacity-60 hover:opacity-100 transition-opacity">
                        <div className="flex items-center gap-6 rotate-180">
                            <p className="text-xs tracking-[0.4em] uppercase text-gray-400 font-bold">Yasmin Akter Liza</p>
                            <span className="w-12 h-[1px] bg-[#CD7F32]/50"></span>
                            <p className="text-xs tracking-[0.4em] uppercase text-[#CD7F32] font-bold">Junior Architect</p>
                        </div>
                    </div>

                    {/* Navigation */}
                    <nav className="fixed top-0 w-full p-6 md:p-10 flex justify-between items-center z-[150] mix-blend-difference">
                        <div className="text-lg md:text-xl font-bold tracking-tighter flex items-center gap-4 group">
                            <div className="w-8 h-8 border border-[#CD7F32] flex items-center justify-center rotate-45 group-hover:bg-[#CD7F32] transition-all duration-500">
                                <span className="text-xs -rotate-45 text-[#CD7F32] group-hover:text-black font-bold">YA</span>
                            </div>
                            <span className="text-xs md:text-sm tracking-[0.2em] uppercase hidden sm:block">Architecture Studio</span>
                        </div>
                        <div className="flex gap-6 md:gap-10 items-center text-xs uppercase tracking-[0.2em] font-bold text-white/80">
                            <a href="#about" aria-label="Go to Manifesto section" className="hover:text-[#CD7F32] transition-colors relative after:content-[''] after:absolute after:bottom-[-4px] after:left-0 after:w-0 after:h-[1px] after:bg-[#CD7F32] hover:after:w-full after:transition-all">Manifesto</a>
                            <a href="#contact" aria-label="Go to Contact section" className="hover:text-white transition-all bg-white/5 border border-white/10 px-6 py-2 md:px-8 md:py-3 rounded-sm backdrop-blur-md hover:bg-[#CD7F32] hover:text-black hover:border-[#CD7F32]">Contact</a>
                        </div>
                    </nav>

                    {/* 1. Hero Section */}
                    <section className="relative min-h-screen w-full flex flex-col items-center justify-center pt-24 px-6 overflow-hidden">
                        
                        {/* Dynamic Dimensions Labels (Desktop Only) */}
                        <div className="absolute z-30 w-full max-w-4xl h-[600px] pointer-events-none opacity-40 hidden lg:block">
                            <div className="absolute top-[20%] left-[10%] w-[80%] h-[1px] bg-white/20 flex justify-center items-center">
                                <span ref={dimXRef} className="bg-[#080808] px-3 font-mono text-xs text-[#CD7F32] tracking-widest uppercase">Dim_X: 0.00</span>
                            </div>
                            <div className="absolute top-[10%] left-[20%] w-[1px] h-[80%] bg-white/20 flex justify-center items-center">
                                <span ref={dimYRef} className="bg-[#080808] py-3 font-mono text-xs text-[#CD7F32] tracking-widest uppercase vertical-rl rotate-180">Dim_Y: 0.00</span>
                            </div>
                        </div>

                        {/* 3D Architectural Core */}
                        <div 
                            ref={cardRef}
                            className="absolute z-10 w-[300px] h-[450px] sm:w-[350px] sm:h-[550px] md:w-[450px] md:h-[650px] border border-white/[0.06] bg-gradient-to-br from-white/[0.04] to-transparent backdrop-blur-2xl transition-transform duration-75 ease-linear shadow-[0_0_100px_rgba(0,0,0,0.8)] will-change-transform"
                            style={{ transformStyle: 'preserve-3d' }}
                        >
                            <div className="absolute inset-0 border-l border-white/10 [transform:translateZ(60px)]"></div>
                            <div className="absolute inset-0 border-t border-[#CD7F32]/40 [transform:translateZ(-60px)]"></div>
                            <div className="absolute inset-6 border border-white/10 opacity-40"></div>
                            <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-48 h-48 bg-gradient-to-r from-[#CD7F32]/15 to-transparent blur-[80px]"></div>
                        </div>

                        {/* Hero Typography */}
                        <FadeInSection className="z-40 text-center relative w-full">
                            <p className="text-xs tracking-[0.4em] uppercase text-[#CD7F32] mb-8 md:mb-10 font-bold flex items-center justify-center gap-3">
                                <Icon name="scan-line" className="w-5 h-5" /> Professional Portfolio
                            </p>
                            
                            <h1 className="text-[16vw] md:text-[10vw] lg:text-[8vw] font-serif font-light leading-[0.85] tracking-tight italic text-white/90">
                                Yasmin <span className="text-outline font-sans font-extrabold not-italic text-white/20">Akter</span>
                            </h1>
                            <h1 className="text-[16vw] md:text-[10vw] lg:text-[8vw] font-extrabold leading-[0.85] tracking-tighter mt-2 md:mt-0 text-white">
                                Liza.
                            </h1>
                            
                            <div className="mt-12 md:mt-16 flex flex-col sm:flex-row justify-center items-center gap-6 sm:gap-12">
                                <div className="flex items-center gap-4 group">
                                    <Icon name="frame" className="w-5 h-5 text-[#CD7F32] group-hover:rotate-90 transition-transform" />
                                    <p className="text-xs tracking-[0.3em] uppercase text-gray-300 font-medium">Exterior Design</p>
                                </div>
                                <span className="hidden sm:block w-1.5 h-1.5 rounded-full bg-[#CD7F32]/50"></span>
                                <div className="flex items-center gap-4 group">
                                    <Icon name="layers" className="w-5 h-5 text-[#CD7F32] group-hover:scale-110 transition-transform" />
                                    <p className="text-xs tracking-[0.3em] uppercase text-gray-300 font-medium">Interior Planning</p>
                                </div>
                            </div>
                        </FadeInSection>
                    </section>

                    {/* 2. Metrics Section */}
                    <section className="py-20 md:py-24 px-6 md:px-20 relative z-40 bg-[#080808]">
                        <div className="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-3 shadow-2xl border border-white/10 rounded-sm">
                            <MetricCard count="20" label="BUILT PROJECTS" sub="Commercial & Residential Execution" delay={0} iconName="building-2" />
                            <MetricCard count="28" label="MONTHS RECORD" sub="At Archvista Design Studio" delay={150} iconName="ruler" />
                            <MetricCard count="PREMIUM" label="DESIGN QUALITY" sub="Delivering 'Joss' Spatial Experiences" delay={300} iconName="scan-line" isLast={true} />
                        </div>
                    </section>

                    {/* 3. Biography Section */}
                    <section id="about" className="py-24 md:py-32 px-6 md:px-20 bg-[#0a0a0a] relative z-40">
                        <div className="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-16 lg:gap-24 items-center">
                            
                            {/* Image Frame */}
                            <div className="lg:col-span-5 relative group order-2 lg:order-1">
                                <FadeInSection direction="left">
                                    <div className="relative aspect-[4/5] rounded-sm overflow-hidden border border-white/10 bg-[#111]">
                                        <img 
                                            src="https://images.unsplash.com/photo-1511818966892-d7d671e672a2?auto=format&fit=crop&q=80&w=1200" 
                                            alt="Architectural structure representing spatial design" 
                                            className="absolute inset-0 w-full h-full object-cover opacity-50 grayscale group-hover:scale-105 group-hover:opacity-80 transition-all duration-1000"
                                        />
                                        <div className="absolute inset-0 bg-gradient-to-t from-[#0a0a0a] via-[#0a0a0a]/40 to-transparent opacity-90"></div>
                                        
                                        <div className="absolute top-6 left-6 md:top-10 md:left-10 p-4 border-l-2 border-[#CD7F32]">
                                            <span className="text-xs tracking-[0.4em] uppercase text-[#CD7F32] font-bold">Biography</span>
                                        </div>
                                        
                                        <div className="absolute bottom-8 left-8 right-8 md:bottom-12 md:left-12 md:right-12">
                                            <h4 className="text-4xl md:text-5xl font-serif italic text-white mb-3 leading-none tracking-tighter">Yasmin Akter</h4>
                                            <p className="text-xs tracking-[0.2em] uppercase text-gray-300 font-bold mb-5">Principal Architect & Visionary</p>
                                            <div className="h-[1px] w-full bg-white/20"></div>
                                            <p className="mt-5 text-sm text-[#CD7F32] tracking-widest font-bold uppercase italic">"Proudly Mr. Raw's Wife"</p>
                                        </div>
                                    </div>
                                </FadeInSection>
                            </div>
                            
                            {/* Manifesto Text */}
                            <div className="lg:col-span-7 space-y-10 lg:space-y-12 order-1 lg:order-2">
                                <FadeInSection>
                                    <h2 className="text-sm tracking-[0.3em] uppercase text-gray-400 font-bold mb-6 flex items-center gap-4">
                                        <span className="w-10 h-[1px] bg-[#CD7F32]"></span> Manifesto 2026
                                    </h2>
                                    <h3 className="text-4xl sm:text-5xl md:text-6xl font-serif font-light leading-[1.1] text-white">
                                        Designing for the <span className="italic text-[#CD7F32]">future</span> of Bangladesh.
                                    </h3>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8 md:gap-12 mt-10 text-gray-300 font-light text-base leading-relaxed">
                                        <p>Based in the heart of <b className="text-white font-semibold">Mirpur, Dhaka</b>, I have spent the last <b className="text-white font-semibold">2.4 years</b> bridging the gap between artistic vision and structural feasibility. At Archvista, my role involves overseeing a diverse portfolio of 20 built works.</p>
                                        <p>My philosophy is rooted in <b className="text-white font-semibold">Material Honesty</b> and <b className="text-white font-semibold">Spatial Efficiency</b>. I believe a project is truly successful when it creates a 'Joss' emotional response, providing users with true inspiration.</p>
                                    </div>
                                </FadeInSection>
                            </div>
                        </div>
                    </section>

                    {/* 4. Timeline Section */}
                    <section className="py-24 md:py-32 px-6 md:px-20 relative z-40 border-t border-white/10 bg-[#080808]">
                        <div className="max-w-7xl mx-auto">
                            <FadeInSection className="flex flex-col md:flex-row md:items-end justify-between mb-16 md:mb-24 gap-8">
                                <div className="max-w-xl">
                                    <h2 className="text-xs tracking-[0.3em] uppercase text-[#CD7F32] font-bold mb-4 md:mb-6">Blueprint of Growth</h2>
                                    <h3 className="text-5xl sm:text-6xl md:text-7xl font-serif font-light text-white italic leading-none">Career Roadmap</h3>
                                </div>
                                <p className="text-base text-gray-400 max-w-xs font-light leading-relaxed tracking-wide">A comprehensive look into my academic journey and professional milestones.</p>
                            </FadeInSection>

                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-16 md:gap-20">
                                <TimelineGroup title="Professional Record" iconName="building-2" items={[
                                    { title: "Junior Architect", subtitle: "Archvista Design Studio", date: "2Y 4M Exp", desc: "Spearheading architectural exterior designs and interior project management for residential complexes." }
                                ]} />
                                <TimelineGroup title="Education Pathway" iconName="book-open" items={[
                                    { title: "Bachelor of Architecture", subtitle: "Currently Running", date: "Present", desc: "Focusing on parametric design, urban sustainability, and advanced building physics." },
                                    { title: "Diploma in Architecture", subtitle: "Complete Graduate", date: "Honours", desc: "Specialized in structural drawings, material science, and building site operations." }
                                ]} />
                            </div>

                            <div className="mt-24 md:mt-32 grid grid-cols-1 md:grid-cols-3 gap-1 shadow-2xl border border-white/10">
                                <HighlightCard iconName="award" title="Best Team Leader" sub="Management Excellence Award" />
                                <HighlightCard iconName="award" title="Best Intern Award" sub="Recognition of Performance" />
                                <HighlightCard iconName="scan-line" title="Pub. Year 2023" sub="Architectural Journal Entry" isLast={true} />
                            </div>
                        </div>
                    </section>

                    {/* 5. Contact Section */}
                    <section id="contact" className="py-24 md:py-40 px-6 md:px-20 bg-white text-[#0a0a0a] relative z-40 rounded-t-[3rem] md:rounded-t-[6rem]">
                        <div className="max-w-7xl mx-auto text-center relative overflow-hidden">
                            <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 opacity-[0.03] select-none pointer-events-none hidden lg:block">
                                <h2 className="text-[20vw] font-bold leading-none uppercase tracking-tighter text-black">YASMIN</h2>
                            </div>
                            <FadeInSection>
                                <h2 className="text-[12vw] md:text-[8vw] font-serif font-light leading-none italic mb-10 tracking-tighter">
                                    Build your <br/> <span className="font-sans font-extrabold not-italic text-black tracking-tighter shimmer">Vision.</span>
                                </h2>
                                
                                <div className="w-full max-w-3xl mx-auto bg-black/5 p-8 md:p-16 rounded-2xl backdrop-blur-xl border border-black/10 relative z-10">
                                    <p className="text-xs tracking-[0.3em] uppercase font-bold text-gray-500 mb-8 md:mb-10">Connect via Official Channel</p>
                                    
                                    <a href="mailto:lyasminakter16@gmail.com" aria-label="Send an email to Yasmin" className="text-xl sm:text-2xl md:text-3xl font-bold text-black hover:text-[#CD7F32] transition-colors duration-300 break-all sm:break-normal">
                                        lyasminakter16@gmail.com
                                    </a>
                                    
                                    <div className="flex flex-wrap justify-center gap-6 md:gap-10 mt-12 md:mt-16 text-xs uppercase tracking-[0.2em] font-extrabold">
                                        <a href="#" aria-label="Visit LinkedIn Profile" className="flex items-center gap-3 hover:text-[#CD7F32] transition-all group"><Icon name="linkedin" className="w-5 h-5 group-hover:scale-110 transition-transform"/> LinkedIn</a>
                                        <a href="#" aria-label="Download Digital CV" className="flex items-center gap-3 hover:text-[#CD7F32] transition-all group"><Icon name="mouse-pointer-2" className="w-5 h-5 group-hover:-translate-y-1 transition-transform"/> Digital CV</a>
                                    </div>
                                </div>
                                
                                <div className="mt-16 flex items-center justify-center gap-4">
                                    <Icon name="map-pin" className="text-[#CD7F32] w-5 h-5 md:w-6 md:h-6" />
                                    <p className="text-sm font-bold uppercase tracking-[0.2em]">Mirpur // Dhaka // Bangladesh</p>
                                </div>
                            </FadeInSection>
                        </div>
                    </section>

                    <footer className="py-10 px-6 md:px-10 bg-[#f8f8f8] text-black/60 text-xs uppercase tracking-[0.2em] font-bold flex flex-col md:flex-row justify-between items-center gap-6 border-t border-black/10 relative z-40 text-center md:text-left">
                        <p>© 2026 YASMIN AKTER LIZA Studio</p>
                        <p className="hidden md:block">Architectural Manifesto // Ver 5.1</p>
                        <p>Built works: 20 Successive Projects</p>
                    </footer>
                </div>
            );
        }

        // --- Custom Components ---

        const MetricCard = ({ count, label, sub, iconName, delay, isLast }) => {
            const borderClasses = isLast ? "" : "border-b md:border-b-0 md:border-r border-white/10";
            return (
                <FadeInSection delay={delay} className={`p-8 md:p-12 bg-white/[0.02] ${borderClasses} hover:bg-white/[0.05] transition-colors duration-500 group backdrop-blur-md`}>
                    <div className="text-[#CD7F32] mb-6 md:mb-8 group-hover:rotate-12 group-hover:scale-110 transition-transform duration-300">
                        <Icon name={iconName} className="w-6 h-6 md:w-8 md:h-8" />
                    </div>
                    <h3 className="text-5xl md:text-6xl font-extrabold mb-3 tracking-tighter text-white group-hover:text-[#CD7F32] transition-colors">{count}</h3>
                    <p className="text-xs font-bold tracking-[0.2em] text-white uppercase mb-2">{label}</p>
                    <p className="text-sm text-gray-400 group-hover:text-gray-300 transition-colors leading-relaxed">{sub}</p>
                </FadeInSection>
            );
        };

        const TimelineGroup = ({ title, iconName, items }) => {
            return (
                <div className="flex flex-col gap-8 md:gap-10">
                    <div className="flex items-center gap-4 text-[#CD7F32]">
                        <div className="p-3 bg-white/5 rounded-sm border border-white/10"><Icon name={iconName} className="w-5 h-5" /></div>
                        <h4 className="text-sm tracking-[0.3em] uppercase font-extrabold text-white">{title}</h4>
                    </div>
                    <div className="border-l border-white/20 pl-8 md:pl-10 space-y-12 ml-4">
                        {items.map((item, i) => (
                            <div key={i} className="relative group">
                                <div className="absolute -left-[38px] md:-left-[46px] top-1.5 w-3 h-3 md:w-4 md:h-4 rounded-none border border-[#CD7F32] bg-[#080808] rotate-45 group-hover:bg-[#CD7F32] transition-colors duration-300"></div>
                                
                                <h5 className="text-xl md:text-2xl font-extrabold tracking-tighter uppercase group-hover:text-[#CD7F32] transition-colors duration-300 leading-tight">{item.title}</h5>
                                <div className="flex flex-wrap items-center gap-3 my-3">
                                    <span className="text-xs font-bold text-[#CD7F32] tracking-[0.1em] uppercase">{item.subtitle}</span>
                                    <span className="text-xs text-gray-500 font-mono tracking-tighter">[{item.date}]</span>
                                </div>
                                <p className="text-sm text-gray-400 font-light leading-relaxed max-w-md group-hover:text-gray-300 transition-colors">{item.desc}</p>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const HighlightCard = ({ iconName, title, sub, isLast }) => {
            const borderClasses = isLast ? "" : "border-b md:border-b-0 md:border-r border-white/10";
            return (
                <div className={`p-8 md:p-12 bg-white/[0.01] ${borderClasses} hover:bg-white/[0.04] transition-colors duration-500 group relative overflow-hidden`}>
                    <div className="absolute top-0 right-0 w-8 h-[1px] bg-white/20"></div>
                    <div className="absolute top-0 right-0 h-8 w-[1px] bg-white/20"></div>
                    <div className="text-[#CD7F32] mb-6 md:mb-8 group-hover:scale-110 group-hover:translate-x-2 transition-transform duration-300">
                        <Icon name={iconName} className="w-6 h-6 md:w-8 md:h-8" />
                    </div>
                    <h5 className="text-lg md:text-xl font-extrabold tracking-tighter uppercase group-hover:text-white transition-colors">{title}</h5>
                    <p className="text-xs tracking-[0.2em] text-gray-400 mt-2 font-bold group-hover:text-[#CD7F32] transition-colors uppercase">{sub}</p>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
